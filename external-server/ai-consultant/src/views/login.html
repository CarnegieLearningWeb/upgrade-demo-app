<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - AI Experiment Consultant</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f3f4;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.14);
            padding: 48px 40px 40px;
            text-align: center;
            max-width: 380px;
            width: 100%;
        }
        h1 { font-size: 1.3rem; color: #202124; margin-bottom: 6px; }
        .subtitle { color: #5f6368; font-size: 0.875rem; margin-bottom: 32px; line-height: 1.5; }
        #error {
            color: #c5221f;
            font-size: 0.8125rem;
            margin-top: 16px;
            min-height: 1.2em;
            line-height: 1.4;
        }
        #g_id_signin { display: flex; justify-content: center; }
    </style>
</head>
<body>
    <div class="card">
        <h1>AI Experiment Consultant</h1>
        <p class="subtitle">Sign in with your Google account to continue.</p>

        <div id="g_id_onload"
             data-client_id="{{GOOGLE_CLIENT_ID}}"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div id="g_id_signin"
             class="g_id_signin"
             data-type="standard"
             data-size="large"
             data-theme="outline"
             data-text="sign_in_with"
             data-shape="rectangular"
             data-logo_alignment="left">
        </div>

        <div id="error"></div>
    </div>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script>
        const appBase = "{{APP_BASE}}";

        function getErrorMessage(data) {
            if (typeof data?.error === "string") return data.error;
            return data?.error?.message || "Sign in failed. Please try again.";
        }

        async function handleCredentialResponse(response) {
            const errorEl = document.getElementById("error");
            errorEl.textContent = "";
            try {
                const res = await fetch(appBase + "/api/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ credential: response.credential }),
                    credentials: "same-origin"
                });
                const data = await res.json();
                if (res.ok && data.ok) {
                    window.location.href = appBase + "/";
                } else {
                    errorEl.textContent = getErrorMessage(data);
                }
            } catch (err) {
                errorEl.textContent = "Network error. Please try again.";
            }
        }
    </script>
</body>
</html>
